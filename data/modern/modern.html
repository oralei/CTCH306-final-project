<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tdc - modern</title>
  <link rel="icon" type="image/x-icon" href="/src/images/favicon.png">
  <link rel="stylesheet" href="/src/dialogue.css"/>
  <link rel="stylesheet" href="/src/parallax.css"/>
  <!-- ERA SPECIFIC CSS -->
  <link rel="stylesheet" href="/data/modern/modern.css" />
  <link rel="stylesheet" href="/data/modern/modern-dialogue.css" />
</head>

<body>
  <!-- Instantly makes the page black before anything else loads -->
  <div id="scene-fade-overlay"></div>

  <!-- Parallax Elements -->
  <div id="scene-container">
    <!-- The lower the line, the more in front the image is (higher depth value) -->
    <div class="parallax-item parallax-full bg" data-depth="0.05" data-tilt="0.08"></div>

    <!-- TOWER ! -->
    <img class="parallax-item" data-depth="0.1" data-tilt="0.3" id='radio-tower' src="/data/modern/media/cellphone.png">
    <!-- SATELLITE ! -->
    <img class="parallax-item" data-depth="0.11" data-tilt="0.11" id='satellite' src="/data/modern/media/satellite.png">

    <div class="parallax-item parallax-full eastYork" data-depth="0.11" data-tilt="0.1"></div>
    <!-- CRAB ! -->
    <img class="parallax-item" data-depth="0.23" data-tilt="0.3" id='crab' src="/data/modern/media/crab.png">

    <!-- DEBUG NEXT BUTTONS --> <!--
    <div class="parallax-item test-title">TIS BUT A SCRATCH</div>
    <button type="button" id="nextSceneBtn" class="next-button">GO NEXT SCENE!</button> -->

    <!-- Vignette, Godrays-->
    <!-- Vignette<img class="parallax-item parallax-full vignette" data-depth="0.1" data-tilt="0.1" src="images/vignette.png">-->
  </div>

  <div class="parallax-item phone" id="phone-main" data-depth="0.2" data-tilt="0.55">
    <div class="phone-screen hidden" id="screen">
      <div class="app internet-app" id="internet-app"></div>
      <div class="app-empty"></div>
      <div class="app-empty"></div>
      <div class="app-empty"></div>
      <div class="app-empty"></div>
      <div class="app-empty"></div>
      <div class="app-empty"></div>
      <div class="app-empty"></div>
      <div class="app-empty"></div>
      <div class="app-empty"></div>
    </div>
  </div>


  <div class="noselect" id="dialogue-box">
    <div class="noselect" id="app-name"> 
      <img class="text-icon" src="/data/modern/media/textMsg.png">
      Messages App
    </div>
    <div class="noselect" id="speaker"></div>
    <div class="noselect" id="dialogue-text"></div>
    <div class="noselect" id="choices"></div>
    <div class="noselect" id="continue-hint">Click to continue</div>
  
  </div>

  <!-- Audio -->
  <audio id="street" autoplay loop style="display:none">
    <source src="/data/modern/audio/street.mp3" type="audio/mp3">
    Your browser does not support the audio element.
  </audio>

  <audio id="next-sound" style="display:none">
    <source src="/data/modern/audio/text-type.mp3" type="audio/mp3">
  </audio>

</body>

<script src="/src/sceneManager.js"></script>
<script src="/src/dialogue.js"></script>
<script src="/src/parallax.js"></script>
<script src="/data/modern/modern.js"></script>
<script>
  var audio = document.getElementById("street");
  audio.volume = 0.2; // Made silent for now
</script>
</html>
