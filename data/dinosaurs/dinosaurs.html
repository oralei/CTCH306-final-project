<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/CTCH306-final-project/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tdc - dino</title>
  <link rel="icon" type="image/x-icon" href="src/images/favicon.png">
  <link rel="stylesheet" href="src/dialogue.css"/>
  <link rel="stylesheet" href="src/parallax.css"/>
  <link rel="stylesheet" href="data/intro/intro.css" />
  <link rel="stylesheet" href="data/dinosaurs/dinosaurs.css" />
  <link rel="stylesheet" href="data/dinosaurs/dino-dialogue.css" />
</head>

<body>
  <!-- Instantly makes the page black before anything else loads -->
  <div id="scene-fade-overlay"></div>

  <!-- Parallax Elements -->
  <div id="scene-container">
    <!-- The lower the line, the more in front the image is (higher depth value) -->
    <div class="parallax-item parallax-full bg" id="sky-bg" data-depth="0.1" data-tilt="0.08"></div>
    <div class="parallax-item parallax-full clouds" data-depth="0.14" data-tilt="0.1"></div>
    <div class="parallax-item parallax-full mountain" data-depth="0.16" data-tilt="0.1"></div>
    <div class="parallax-item parallax-full back-forest-1" data-depth="0.18" data-tilt="0.1"></div>
    <div class="parallax-item parallax-full back-forest-2" data-depth="0.15" data-tilt="0.1"></div>
    <div class="parallax-item parallax-full ground" data-depth="0.15" data-tilt="0.1"></div>
    <div class="parallax-item parallax-full back-tree-1" data-depth="0.15" data-tilt="0.11"></div>
    <div class="parallax-item parallax-full back-tree-2" data-depth="0.15" data-tilt="0.12"></div>

    <!-- DINOASAUR TREX ! -->
    <img class="parallax-item" data-depth="0.12" data-tilt="0.2" id='trex' src="data/dinosaurs/media/dino.png">

    <div class="parallax-item parallax-full clickthru front-tree-2" data-depth="0.15" data-tilt="0.16"></div>

    <div class="parallax-item parallax-full clickthru palm-2" data-depth="0.15" data-tilt="0.12"></div>
    <div class="parallax-item parallax-full clickthru palm-3" data-depth="0.15" data-tilt="0.12"></div>

    <div class="parallax-item parallax-full clickthru front-leaf-1" data-depth="0.23" data-tilt="0.2"></div>
    <div class="parallax-item parallax-full clickthru front-leaf-2" data-depth="0.34" data-tilt="0.22"></div>

    <!-- CRAB ! -->
    <img class="parallax-item" data-depth="0.4" data-tilt="1" id='crab' src="data/dinosaurs/media/crabMain.png">

    <div class="parallax-item parallax-full clickthru front-tree-1" data-depth="0.15" data-tilt="0.17"></div>
    <div class="parallax-item parallax-full clickthru palm-1" data-depth="0.34" data-tilt="0.2"></div>
    <div class="parallax-item parallax-full clickthru bush-1" data-depth="0.25" data-tilt="0.4"></div>

    <!-- METEOR ! -->
    <div class="parallax-item meteor hidden" data-depth="0.4" data-tilt="0.4" id='meteor'></div>

  </div>

  <div class="noselect" id="dialogue-box">
    <div class="noselect" id="speaker"></div>
    <div class="noselect" id="dialogue-text"></div>
    <div class="noselect" id="choices"></div>
    <div class="noselect" id="continue-hint">click to continue</div>
  </div>

  <!-- Audio -->
  <audio id="wind" autoplay loop style="display:none">
    <source src="data/dinosaurs/audio/jungle-ambience.mp3" type="audio/mp3">
  </audio>
  <audio id="next-sound" style="display:none">
    <source src="data/dinosaurs/audio/pencil.mp3" type="audio/mp3">
  </audio>

</body>

<script src="src/sceneManager.js"></script>
<script src="src/dialogue.js"></script>
<script src="src/parallax.js"></script>
<script src="data/dinosaurs/dinosaurs.js"></script>
<script>
  var audio = document.getElementById("wind");
  audio.volume = 0.3; // Made silent for now
</script>

</html>
