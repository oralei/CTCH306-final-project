<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Individual Object Parallax Scene</title>
    <link rel="stylesheet" href="src/parallax.css" />
</head>
<body>

    <div id="scene-container">
        <div class="parallax-item bg" data-depth="0.1" data-tilt="0.08"></div>
        
        <div class="parallax-item mid-planet" data-depth="0.3" data-tilt="0.3">Mid<br>Object</div>
        <div class="parallax-item mid-panel" data-depth="0.4" data-tilt="0.3">Mid<br>Panel</div>
        
        <div class="parallax-item front-rock-left" data-depth="0.5" data-tilt="0.6">Front<br>Left</div>
        <div class="parallax-item front-crystal-right" data-depth="0.5" data-tilt="0.6">Front<br>Right</div>
    </div>

    <script src="src/parallax.js"></script>

</body>
</html>
